name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking gates — must pass for merge/deploy confidence.
  test:
    name: Lint · Unit tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests (Vitest + MSW)
        run: npm test
      - name: Production build
        # Placeholder env — real values are baked in by Vercel's own build.
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
        run: npm run build

  # Non-blocking: 3,280 legacy TS errors as of 2026-07-05. Tracked as a
  # burn-down — flip continue-on-error off once the count reaches zero.
  typecheck:
    name: Typecheck (burn-down, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
