<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Recruiter X · HubSpot-style nav preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --brand-primary: #9333EA;
    --brand-secondary: #2563EB;
    --brand-gradient: linear-gradient(135deg, #9333EA 0%, #2563EB 100%);
    --slate-50: #F8FAFC;
    --slate-100: #F1F5F9;
    --slate-200: #E2E8F0;
    --slate-400: #94A3B8;
    --slate-500: #64748B;
    --slate-600: #475569;
    --slate-900: #0F172A;
  }
  html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; color: var(--slate-900); background: var(--slate-50); }
  .gradient-bg { background: var(--brand-gradient); }
  .gradient-text { background: var(--brand-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
  .brand-shadow { box-shadow: 0 6px 22px -8px rgba(147,51,234,.35); }

  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ── 56px icon rail ───────────────────────────────────────── */
  .rail { width: 56px; background: #fff; border-right: 1px solid var(--slate-200); display: flex; flex-direction: column; align-items: center; flex-shrink: 0; z-index: 30; position: relative; }
  .rail-logo { width: 36px; height: 36px; border-radius: 9px; background: var(--brand-gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 12px; letter-spacing: -.04em; margin: 10px 0 6px; box-shadow: 0 4px 14px -4px rgba(147,51,234,.45); }
  .rail-scroll { flex: 1; width: 100%; padding: 6px 0; display: flex; flex-direction: column; align-items: center; gap: 2px; overflow-y: auto; scrollbar-width: none; }
  .rail-scroll::-webkit-scrollbar { display: none; }
  .rail-divider { width: 28px; height: 1px; background: var(--slate-200); margin: 6px 0; }
  .rail-btn { position: relative; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--slate-500); border: none; background: transparent; transition: background-color 150ms ease, color 150ms ease; }
  .rail-btn:hover { background: var(--slate-100); color: var(--slate-600); }
  .rail-btn.active { background: rgba(147,51,234,.10); color: var(--brand-primary); }
  .rail-btn.active::before { content: ""; position: absolute; left: -10px; top: 8px; bottom: 8px; width: 3px; border-radius: 2px; background: var(--brand-gradient); }
  .rail-btn.hovered { background: var(--slate-100); color: var(--slate-600); }
  .rail-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--brand-gradient); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin: 8px 0; box-shadow: 0 4px 14px -4px rgba(147,51,234,.45); cursor: pointer; }

  /* ── flyout ──────────────────────────────────────────────── */
  .flyout { position: fixed; top: 0; left: 56px; height: 100vh; width: 240px; background: #fff; border-right: 1px solid var(--slate-200); box-shadow: 6px 0 24px -12px rgba(15,23,42,.12); display: flex; flex-direction: column; z-index: 29; opacity: 0; transform: translateX(-6px); pointer-events: none; transition: opacity 140ms ease, transform 140ms ease; }
  .flyout.open { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .flyout-header { height: 52px; padding: 0 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--slate-200); flex-shrink: 0; font-weight: 700; font-size: 14px; color: var(--slate-900); letter-spacing: -.01em; }
  .flyout-header-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--brand-primary); text-transform: uppercase; }
  .flyout-body { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: none; }
  .flyout-body::-webkit-scrollbar { display: none; }
  .flyout-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: var(--slate-600); cursor: pointer; user-select: none; }
  .flyout-item:hover { background: var(--slate-100); color: var(--slate-900); }
  .flyout-item.active { background: rgba(147,51,234,.08); color: var(--brand-primary); font-weight: 600; }
  .flyout-item .icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--slate-400); }
  .flyout-item.active .icon { color: var(--brand-primary); }
  .badge { font-size: 10.5px; font-weight: 600; padding: 1px 7px; border-radius: 9999px; }
  .badge-purple { background: #FAF5FF; color: var(--brand-primary); }

  /* ── topbar & content ───────────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .topbar { height: 52px; background: #fff; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; padding: 0 16px 0 20px; gap: 12px; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--slate-500); font-weight: 500; }
  .breadcrumb b { color: var(--slate-900); font-weight: 600; }
  .breadcrumb .sep { color: var(--slate-400); }
  .topbar-search { flex: 1; max-width: 380px; display: flex; align-items: center; gap: 8px; background: var(--slate-100); border-radius: 10px; padding: 7px 12px; cursor: text; color: var(--slate-500); font-size: 13px; }
  .topbar-search:hover { background: #E2E8F0; }
  .topbar-search kbd { font-family: "SF Mono", Menlo, monospace; font-size: 10px; background: #fff; border: 1px solid var(--slate-200); border-radius: 5px; padding: 1px 5px; color: var(--slate-400); }
  .ai-btn { display: flex; align-items: center; gap: 6px; background: var(--brand-gradient); color: #fff; border: none; border-radius: 999px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: -.01em; box-shadow: 0 4px 14px -4px rgba(147,51,234,.45); }
  .ai-btn:hover { opacity: .92; }
  .icon-btn { width: 34px; height: 34px; border-radius: 8px; border: none; background: transparent; display: flex; align-items: center; justify-content: center; color: var(--slate-500); cursor: pointer; position: relative; }
  .icon-btn:hover { background: var(--slate-100); color: var(--slate-700); }
  .notif-dot { position: absolute; top: 8px; right: 8px; width: 7px; height: 7px; background: #EF4444; border-radius: 50%; border: 1.5px solid #fff; }

  /* ── workspace ──────────────────────────────────────────── */
  .work-area { flex: 1; overflow: auto; display: flex; }
  .content { flex: 1; padding: 24px 28px; min-width: 0; }
  .right-panel { width: 360px; background: #fff; border-left: 1px solid var(--slate-200); padding: 18px; overflow-y: auto; flex-shrink: 0; }

  .card { background: #fff; border: 1px solid var(--slate-200); border-radius: 12px; padding: 18px; }
  .card + .card { margin-top: 14px; }
  .h1 { font-size: 22px; font-weight: 700; letter-spacing: -.022em; color: var(--slate-900); margin: 0 0 4px; }
  .sub { font-size: 13px; color: var(--slate-500); margin: 0 0 18px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .pill-ai { background: linear-gradient(135deg,#FAF5FF,#EFF6FF); color: var(--brand-primary); }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .kpi { background: #fff; border: 1px solid var(--slate-200); border-radius: 12px; padding: 14px 16px; }
  .kpi .label { font-size: 11px; color: var(--slate-500); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  .kpi .value { font-size: 24px; font-weight: 700; color: var(--slate-900); margin-top: 4px; letter-spacing: -.02em; }
  .kpi .delta { font-size: 11px; color: #10B981; font-weight: 600; margin-top: 2px; }

  .row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--slate-200); font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: var(--brand-gradient); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

  .ai-card { background: linear-gradient(135deg,#FAF5FF 0%, #EFF6FF 100%); border: 1px solid #E9D5FF; border-radius: 12px; padding: 14px; }
  .stage-pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; background: #FAF5FF; color: var(--brand-primary); }

  /* ── controls (top-right of preview) ────────────────────── */
  .preview-toggle { position: fixed; top: 12px; right: 12px; z-index: 100; display: flex; gap: 6px; background: #fff; border: 1px solid var(--slate-200); border-radius: 999px; padding: 4px; box-shadow: 0 8px 22px -10px rgba(15,23,42,.18); font-size: 12px; }
  .preview-toggle button { border: none; background: transparent; padding: 6px 12px; border-radius: 999px; cursor: pointer; color: var(--slate-500); font-weight: 600; }
  .preview-toggle button.active { background: var(--brand-gradient); color: #fff; }
</style>
</head>
<body>

<div class="preview-toggle">
  <button id="toggle-page-dashboard" class="active" onclick="setPage('dashboard')">Dashboard</button>
  <button id="toggle-page-candidate" onclick="setPage('candidate')">Candidate detail</button>
</div>

<div class="app">
  <!-- ── 56px icon rail ───────────────────────────────── -->
  <aside class="rail" id="rail">
    <div class="rail-logo" title="Recruiter X">RX</div>
    <div class="rail-scroll" id="rail-buttons"></div>
    <div class="rail-avatar" title="Sarah Lee">SL</div>
  </aside>

  <!-- ── flyout panel (absolutely positioned) ─────────── -->
  <div class="flyout" id="flyout" onmouseenter="cancelClose()" onmouseleave="scheduleClose()">
    <div class="flyout-header">
      <div>
        <div class="flyout-header-eyebrow" id="fly-eyebrow">RECRUITING</div>
        <div id="fly-title" style="font-size:14px;font-weight:700;color:var(--slate-900)">Recruiting</div>
      </div>
    </div>
    <div class="flyout-body" id="flyout-body"></div>
  </div>

  <!-- ── main column ──────────────────────────────────── -->
  <div class="main">
    <header class="topbar">
      <div class="breadcrumb" id="breadcrumb">
        <span>Recruiting</span>
        <span class="sep">/</span>
        <b>Dashboard</b>
      </div>
      <div class="topbar-search">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <span>Search candidates, jobs, companies…</span>
        <kbd>⌘K</kbd>
      </div>
      <button class="ai-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        AI Actions
      </button>
      <button class="icon-btn" title="Notifications">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span class="notif-dot"></span>
      </button>
    </header>

    <div class="work-area" id="work-area">
      <!-- content injected by JS depending on page -->
    </div>
  </div>
</div>

<script>

// Render rail
const railEl = document.getElementById('rail-buttons');
groups.forEach((g, i) => {
  // Divider before "operations" and "accounts"
  if (g.id === 'operations' || g.id === 'accounts') {
    const d = document.createElement('div'); d.className = 'rail-divider'; railEl.appendChild(d);
  }
  const btn = document.createElement('button');
  btn.className = 'rail-btn';
  btn.dataset.gid = g.id;
  btn.title = g.label;
  btn.setAttribute('aria-label', g.label);
  btn.innerHTML = g.icon;
  if (g.id === 'home') btn.classList.add('active'); // Dashboard is the starting page
  btn.onmouseenter = () => scheduleOpen(g.id);
  btn.onmouseleave = scheduleClose;
  btn.onclick = () => alert('In the real app this navigates to: ' + g.items[0].title);
  railEl.appendChild(btn);
});

// ── Flyout open/close logic ─────────────────────────────────────
const flyoutEl = document.getElementById('flyout');
const flyoutBody = document.getElementById('flyout-body');
const flyEyebrow = document.getElementById('fly-eyebrow');
const flyTitle = document.getElementById('fly-title');
let openTimer = null, closeTimer = null;
let openGid = null;

function scheduleOpen(gid) {
  if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
  if (openTimer) clearTimeout(openTimer);
  openTimer = setTimeout(() => openGroup(gid), 80);
}
function scheduleClose() {
  if (openTimer) { clearTimeout(openTimer); openTimer = null; }
  if (closeTimer) clearTimeout(closeTimer);
  closeTimer = setTimeout(closeFlyout, 180);
}
function cancelClose() { if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; } }

function openGroup(gid) {
  if (openGid === gid && flyoutEl.classList.contains('open')) return;
  openGid = gid;
  const g = groups.find(x => x.id === gid);
  if (!g) return;
  flyEyebrow.textContent = g.label.toUpperCase();
  flyTitle.textContent = g.label;
  flyoutBody.innerHTML = '';
  g.items.forEach(it => {
    const el = document.createElement('div');
    el.className = 'flyout-item' + (it.active ? ' active' : '');
    el.innerHTML = `<span class="icon">${it.icon}</span><span style="flex:1">${it.title}</span>${it.badge ? `<span class="badge badge-purple">${it.badge}</span>` : ''}`;
    el.onclick = () => alert('In the real app this navigates to: ' + it.title);
    flyoutBody.appendChild(el);
  });
  flyoutEl.classList.add('open');
  // Update rail "hovered" tint
  document.querySelectorAll('.rail-btn').forEach(b => b.classList.toggle('hovered', b.dataset.gid === gid && !b.classList.contains('active')));
}
function closeFlyout() {
  flyoutEl.classList.remove('open');
  openGid = null;
  document.querySelectorAll('.rail-btn').forEach(b => b.classList.remove('hovered'));
}
